<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | BUILDATHON '26</title>
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@600;700;800&display=swap" rel="stylesheet">
  <!-- Stylesheets -->
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/login.css">
</head>
<body>

  <div class="login-wrapper">
    <div class="login-container glass-panel">
      <!-- Back Link -->
      <a href="index.html" class="back-link">&larr; Back to Home</a>
      
      <!-- Logo Header -->
      <h2 class="login-logo">
        <span class="logo-neon">BUILD</span>ATHON <span class="logo-version">'26</span>
      </h2>
      <p class="login-subtitle">Student Portal Authentication</p>

      <!-- Google Button -->
      <div class="auth-section">
        <button id="google-login-btn" class="btn-google">
          <svg class="google-icon" viewBox="0 0 24 24" width="20" height="20">
            <path fill="#EA4335" d="M12.24 10.285V14.4h6.887c-.648 2.41-2.519 4.114-5.136 4.114-3.466 0-6.277-2.81-6.277-6.277 0-3.466 2.81-6.277 6.277-6.277 1.5 0 2.87.532 3.94 1.414l3.1-3.1C18.898 1.95 15.772 1 12.24 1 6.033 1 1 6.033 1 12.24s5.033 11.24 11.24 11.24c5.898 0 10.82-3.955 11.66-9.4H12.24z"/>
          </svg>
          Sign In with College Account
        </button>
        <p class="auth-restriction-note">
          ⚠️ Access is strictly restricted to accounts ending with college domain.
        </p>
      </div>

      <!-- Developer Mock Bypass Panel -->
      <div class="dev-panel glass-panel">
        <div class="dev-panel-header" id="dev-toggle">
          <span>🛠️ Offline Test Simulation</span>
          <span class="dev-arrow">&blacktriangledown;</span>
        </div>
        <div class="dev-panel-content" id="dev-content">
          <p class="dev-note">If standard Google credentials are not active, enter a mock username to simulate login exchange.</p>
          <div class="form-group">
            <input type="text" id="mock-username" placeholder="e.g. student123" class="dev-input">
          </div>
          <button id="mock-login-btn" class="btn-cyber btn-cyber-purple dev-btn">Trigger Test Login</button>
        </div>
      </div>
      
    </div>
  </div>

  <script type="module" src="js/login.js"></script>
</body>
</html>
